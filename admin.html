<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDsPCs Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
max-width:1400px;
margin:auto;
padding:40px;
}

.dashboard-header{
margin-bottom:40px;
}

.dashboard-header h1{
font-size:3rem;
margin-bottom:10px;
}

.dashboard-header p{
color:#999;
}

.admin-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.panel{
background:#111;
border:1px solid #222;
border-radius:12px;
padding:30px;
transition:.3s;
}

.panel:hover{
border-color:#444;
}

.panel h2{
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:.9rem;
color:#aaa;
}

.input-group input{
width:100%;
padding:14px;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
}

.input-group input:focus{
outline:none;
border-color:white;
}

.add-btn{
width:100%;
padding:16px;
background:white;
color:black;
font-weight:bold;
border:none;
cursor:pointer;
border-radius:8px;
transition:.25s;
}

.add-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 15px rgba(255,255,255,.2);
}

.product-list{
max-height:700px;
overflow-y:auto;
}

.product-card{
background:#181818;
border:1px solid #2a2a2a;
border-radius:10px;
padding:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
transition:.25s;
}

.product-card:hover{
transform:translateY(-3px);
}

.product-info h3{
margin-bottom:8px;
}

.product-info p{
color:#999;
font-size:.9rem;
margin-bottom:4px;
}

.delete-btn{
background:#c62828;
color:white;
border:none;
padding:12px 18px;
cursor:pointer;
border-radius:8px;
transition:.25s;
}

.delete-btn:hover{
background:#e53935;
}

@media(max-width:1000px){

.admin-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">JDsPCs Admin</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
</div>

</nav>

<div class="container">

<div class="dashboard-header">
<h1>Admin Dashboard</h1>
<p>Manage products for your JDsPCs store.</p>
</div>

<div class="admin-grid">

<div class="panel">

<h2>Add New Product</h2>

<div class="input-group">
<label>Product Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Price</label>
<input type="number" id="price">
</div>

<div class="input-group">
<label>CPU</label>
<input type="text" id="cpu">
</div>

<div class="input-group">
<label>GPU</label>
<input type="text" id="gpu">
</div>

<div class="input-group">
<label>RAM</label>
<input type="text" id="ram">
</div>

<div class="input-group">
<label>Storage</label>
<input type="text" id="storage">
</div>

<div class="input-group">
<label>Image URL</label>
<input type="text" id="image">
</div>

<button class="add-btn" onclick="addProduct()">
ADD PRODUCT
</button>

</div>

<div class="panel">

<h2>Current Products</h2>

<div id="productList" class="product-list"></div>

</div>

</div>

</div>

<script>

function getProducts(){
return JSON.parse(localStorage.getItem("products")) || [];
}

function saveProducts(products){
localStorage.setItem("products", JSON.stringify(products));
}

function addProduct(){

let products = getProducts();

products.push({
name: document.getElementById("name").value,
price: document.getElementById("price").value,
cpu: document.getElementById("cpu").value,
gpu: document.getElementById("gpu").value,
ram: document.getElementById("ram").value,
storage: document.getElementById("storage").value,
image: document.getElementById("image").value
});

saveProducts(products);

renderProducts();

document.querySelectorAll("input").forEach(input=>{
input.value = "";
});

}

function deleteProduct(index){

let products = getProducts();

products.splice(index,1);

saveProducts(products);

renderProducts();

}

function renderProducts(){

let products = getProducts();

let html = "";

products.forEach((product,index)=>{

html += `
<div class="product-card">

<div class="product-info">

<h3>${product.name}</h3>

<p>Price: $${product.price}</p>

<p>${product.cpu}</p>

<p>${product.gpu}</p>

<p>${product.ram}</p>

<p>${product.storage}</p>

</div>

<button class="delete-btn"
onclick="deleteProduct(${index})">
Delete
</button>

</div>
`;

});

document.getElementById("productList").innerHTML = html;

}

renderProducts();

</script>

</body>
</html>
