<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JDsPCs | Checkout</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
CHECKOUT PAGE
========================= */

.checkout-container{
max-width:1500px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.checkout-form,
.summary-card{

background:rgba(17,17,17,.85);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:30px;

}

.checkout-form h2,
.summary-card h2{
margin-bottom:25px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-group input,
.input-group textarea{

width:100%;

padding:15px;

background:#0d0d0d;

border:1px solid #333;

border-radius:12px;

color:white;

font-size:15px;

transition:.3s;

}

.input-group input:focus,
.input-group textarea:focus{

outline:none;

border-color:white;

box-shadow:
0 0 10px rgba(255,255,255,.15);

}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.order-item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
color:#bbb;
}

.total{
font-size:2rem;
font-weight:700;
margin-top:20px;
}

.pay-btn{

width:100%;

padding:18px;

margin-top:20px;

background:white;

color:black;

border:none;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.pay-btn:hover{

transform:translateY(-3px);

box-shadow:
0 0 10px rgba(255,255,255,.3),
0 0 25px rgba(255,255,255,.15);

}

.summary-card{
position:sticky;
top:100px;
height:fit-content;
}

.secure-info{
text-align:center;
margin-top:20px;
color:#888;
font-size:.9rem;
line-height:1.8;
}

@media(max-width:900px){

.checkout-container{
grid-template-columns:1fr;
padding:20px;
}

.form-row{
grid-template-columns:1fr;
}

.summary-card{
position:relative;
top:0;
}

}

</style>

</head>

<body>

<div class="announcement">
🚚 FREE SHIPPING AUSTRALIA-WIDE ON ORDERS OVER $2000
</div>

<nav>

<div class="logo">
JDsPCs
</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
<a href="admin.html">Admin</a>

</div>

</nav>

<section class="hero" style="min-height:30vh;padding:60px 20px;">

<div class="hero-text" style="text-align:center;width:100%;">

<h1>Checkout</h1>

<p>
Complete your order securely.
</p>

</div>

</section>

<div class="checkout-container">

<!-- Shipping Form -->

<div class="checkout-form">

<h2>Shipping Information</h2>

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="John Smith">
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="john@email.com">
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="text" placeholder="04xx xxx xxx">
</div>

<div class="input-group">
<label>Street Address</label>
<input type="text" placeholder="123 Example Street">
</div>

<div class="form-row">

<div class="input-group">
<label>City</label>
<input type="text">
</div>

<div class="input-group">
<label>State</label>
<input type="text">
</div>

</div>

<div class="input-group">
<label>Postcode</label>
<input type="text">
</div>

<div class="input-group">
<label>Order Notes</label>
<textarea rows="4"></textarea>
</div>

</div>

<!-- Summary -->

<div class="summary-card">

<h2>Order Summary</h2>

<div id="orderItems"></div>

<hr style="border-color:#222;margin:20px 0;">

<div class="order-item">
<span>Shipping</span>
<span>FREE</span>
</div>

<div class="order-item">
<span>Tax</span>
<span>Included</span>
</div>

<hr style="border-color:#222;margin:20px 0;">

<div id="totalPrice" class="total">
$0
</div>

<button
class="pay-btn"
onclick="placeOrder()"
>
CONTINUE TO PAYMENT
</button>

<div class="secure-info">

🔒 Secure Checkout<br>
💳 Stripe Protected Payments<br>
🚚 Australia-Wide Shipping

</div>

</div>

</div>

<script>

function loadOrder(){

let cart =
JSON.parse(localStorage.getItem("cart"))
|| [];

let html = "";

let total = 0;

cart.forEach(item=>{

total += item.price * item.quantity;

html += `

<div class="order-item">

<span>
${item.name} x ${item.quantity}
</span>

<span>
$${(item.price * item.quantity).toLocaleString()}
</span>

</div>

`;

});

document.getElementById("orderItems").innerHTML =
html;

document.getElementById("totalPrice").innerHTML =
"$" + total.toLocaleString();

}

function placeOrder(){

alert(
"Stripe Checkout will be connected here."
);

}

loadOrder();

</script>

</body>
</html>
